<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Unachievable Gala | Impossible Awards</title>
  <style>
    /* --- CSS STYLING --- */
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #f59e0b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.5rem;
      color: var(--accent-color);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* Responsive Grid Layout */
    .awards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Award Card Styling */
    .award-card {
      background-color: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid #334155;
    }

    /* Hover effect for desktop */
    @media (hover: hover) {
      .award-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        border-color: var(--accent-color);
      }
    }

    .image-container {
      width: 100%;
      height: 200px;
      background-color: #0f172a;
      position: relative;
    }

    .award-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Fallback styles if the webp image isn't found */
    .image-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
      z-index: 1;
    }

    .award-info {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .award-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--text-main);
    }

    .award-description {
      font-size: 0.95rem;
      color: var(--text-muted);
      flex-grow: 1;
    }

    .badge {
      display: inline-block;
      align-self: flex-start;
      background-color: rgba(245, 158, 11, 0.1);
      color: var(--accent-color);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1rem;
      text-transform: uppercase;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    /* Mobile specific adjustments */
    @media (max-width: 480px) {
      header h1 {
        font-size: 1.8rem;
      }
      body {
        padding: 1rem 0.5rem;
      }
      .awards-grid {
        gap: 1.25rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>The Unachievable Gala</h1>
    <p>Celebrating human milestones that literally no one has ever accomplished.</p>
  </header>

  <main>
    <div class="awards-grid" id="awards-container">
      </div>
  </main>

  <script>
    // --- JAVASCRIPT ---
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('awards-container');

      // Fetch data from our local json file
      fetch('awards.json')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          // Loop through the 15 awards and generate HTML
          data.forEach(award => {
            const card = document.createElement('div');
            card.className = 'award-card';

            card.innerHTML = `
              <div class="image-container">
                <div class="image-placeholder">🏆</div>
                <img 
                  src="${award.image}" 
                  alt="${award.title}" 
                  class="award-img" 
                  onerror="this.style.display='none';"
                >
              </div>
              <div class="award-info">
                <span class="badge">Difficulty: Impossible</span>
                <h2 class="award-title">${award.title}</h2>
                <p class="award-description">${award.description}</p>
              </div>
            `;
            
            container.appendChild(card);
          });
        })
        .catch(error => {
          console.error('Error loading awards data:', error);
          container.innerHTML = `<p style="text-align: center; color: #ef4444; width: 100%;">Failed to load the trophy room. Please check your JSON server setup.</p>`;
        });
    });
  </script>
</body>
</html>
